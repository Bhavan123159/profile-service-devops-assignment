name: Deploy

on:
  workflow_dispatch:

jobs:

  deploy-staging:

    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging"

  deploy-production:

    needs:
      - deploy-staging

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production"
